name: Flutter Build All Platforms & Release

# 触发条件：仅在推送 v 开头的 Tag 时触发（和 Release 发布联动，避免无效打包）
on:
  push:
    tags:
      - 'v*'

# 全局权限配置（必须加，否则无法上传 Release）
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ========== 1. 单元测试（所有平台共用，先跑测试再打包） ==========
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # 改成你项目用的 Flutter 版本，留空自动用最新稳定版
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests
        run: flutter test --machine --coverage > test-results.json

  # ========== 2. Android 构建 ==========
  build-android:
    needs: test # 依赖测试通过，测试失败则不打包
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (分架构)
        run: flutter build apk --release --split-per-abi

      - name: Upload Android to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 3. Windows 构建 ==========
  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows bundle
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath rule_dev_tool-windows-v${{ github.ref_name }}.zip

      - name: Upload Windows to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rule_dev_tool-windows-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 4. Linux 构建 ==========
  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip Linux bundle
        run: zip -r rule_dev_tool-linux-v${{ github.ref_name }}.zip build/linux/x64/release/bundle/

      - name: Upload Linux to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rule_dev_tool-linux-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 5. macOS 构建 ==========
  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS app
        run: zip -r rule_dev_tool-macos-v${{ github.ref_name }}.zip build/macos/Build/Products/Release/rule_dev_tool.app/

      - name: Upload macOS to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            rule_dev_tool-macos-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 6. iOS 构建（仅生成 .xcarchive，无法直接上架 App Store） ==========
  # 注意：iOS 打包需要苹果开发者账号，这里仅生成归档文件，无法直接发布到 App Store
  build-ios:
    needs: test
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Archive)
        run: flutter build ipa --release --no-codesign

      - name: Upload iOS to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/ios/ipa/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
