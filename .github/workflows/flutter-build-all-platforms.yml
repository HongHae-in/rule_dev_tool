name: Flutter Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Android, os: ubuntu-latest, command: flutter build apk --release }
          - { name: Windows, os: windows-latest, command: flutter build windows --release }
          - { name: macOS,   os: macos-latest,   command: flutter config --enable-macos-desktop && flutter build macos --release }
          - { name: Linux,   os: ubuntu-latest,  command: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev && flutter build linux --release }
          - { name: Web,     os: ubuntu-latest,  command: flutter build web --release }
          - { name: iOS,     os: macos-latest,   command: flutter build ios --release --no-codesign }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install dependencies
        run: flutter pub get

      - name: Execute Build
        run: ${{ matrix.platform.command }}

      # ========== 产物处理 (重命名并打包，去除版本号) ==========

      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p output
          case "${{ matrix.platform.name }}" in
            Android)
              cp build/app/outputs/flutter-apk/app-release.apk output/rule_dev_tool.apk
              ;;
            Windows)
              cd build/windows/x64/runner/Release
              zip -r ../../../../../output/rule_dev_tool-windows.zip *
              ;;
            macOS)
              cd build/macos/Build/Products/Release
              zip -r ../../../../../output/rule_dev_tool-macos.zip rule_dev_tool.app
              ;;
            Linux)
              cd build/linux/x64/release/bundle
              zip -r ../../../../../output/rule_dev_tool-linux.zip *
              ;;
            Web)
              cd build/web
              zip -r ../../output/rule_dev_tool-web.zip *
              ;;
            iOS)
              # 因为没有签名没有IPA，所以打包 .app 文件夹
              cd build/ios/iphoneos
              zip -r ../../../output/rule_dev_tool-ios-app.zip Runner.app
              ;;
          esac

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
