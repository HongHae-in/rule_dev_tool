name: Flutter Build Multi-Platform Universal Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: Android, os: ubuntu-latest, command: flutter build apk --release --split-per-abi }
          - { name: Windows, os: windows-latest, command: flutter build windows --release }
          - { name: macOS,   os: macos-latest,   command: flutter config --enable-macos-desktop && flutter build macos --release }
          - { name: Linux,   os: ubuntu-latest,  command: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev && flutter build linux --release }
          - { name: Web,     os: ubuntu-latest,  command: flutter build web --release }
          - { name: iOS,     os: macos-latest,   command: flutter build ios --release --no-codesign }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install dependencies
        run: flutter pub get

      # ========== 核心修正：使用 Perl 跨平台替换版本号 ==========
      - name: Sync Tag Version to Project
        shell: bash
        run: |
          # 1. 提取版本名
          TAG_NAME="${{ github.ref_name }}"
          VERSION_NAME=$(echo $TAG_NAME | sed 's/^v//')
          if [[ "$TAG_NAME" == "master" || "$TAG_NAME" == "main" ]]; then
            VERSION_NAME="1.0.0"
          fi
          
          # 2. 拼接构建号
          VERSION_FULL="${VERSION_NAME}+${{ github.run_number }}"
          
          # 3. 修改 pubspec.yaml (使用 perl 替代 sed 以兼容 macOS)
          perl -i -pe "s/^version: .*/version: $VERSION_FULL/" pubspec.yaml
          
          echo "Final Project Version set to: $VERSION_FULL"

      - name: Execute Build
        run: ${{ matrix.platform.command }}

      # ========== 针对 Windows 安装 zip 工具 ==========
      - name: Install Zip on Windows
        if: matrix.platform.name == 'Windows'
        run: choco install zip -y

      # ========== 产物处理 ==========
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p output
          PROJECT_NAME=$(grep '^name:' pubspec.yaml | cut -d' ' -f2 | tr -d '\r')
          echo "Detected Project Name: $PROJECT_NAME"

          case "${{ matrix.platform.name }}" in
            Android)
              cp build/app/outputs/flutter-apk/*-arm64-v8a-release.apk output/app-android-arm64.apk
              cp build/app/outputs/flutter-apk/*-armeabi-v7a-release.apk output/app-android-armv7.apk
              cp build/app/outputs/flutter-apk/*-x86_64-release.apk output/app-android-x86_64.apk
              ;;
            Windows)
              cd build/windows/x64/runner/Release
              zip -r ../../../../../output/app-windows-portable.zip *
              ;;
            macOS)
              cd build/macos/Build/Products/Release
              zip -r ../../../../../output/app-macos-universal.zip *.app
              ;;
            Linux)
              cd build/linux/x64/release/bundle
              zip -r ../../../../../output/app-linux.zip *
              ;;
            Web)
              cd build/web
              zip -r ../../output/app-web.zip *
              ;;
            iOS)
              cd build/ios/iphoneos
              zip -r ../../../output/app-ios-debug-only.zip Runner.app
              ;;
          esac

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
