name: Flutter Build All Platforms & Release

# 触发条件：推送 v 开头的 Tag，或在 Actions 页面手动点击运行
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 全局权限配置
permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # ========== 1. 单元测试 (暂时跳过，待代码修复后取消注释) ==========
  # test:
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Setup Flutter
  #       uses: subosito/flutter-action@v2
  #       with:
  #         flutter-version: 'any'
  #         channel: 'stable'
  #     - name: Install dependencies
  #       run: flutter pub get
  #     - name: Run unit tests
  #       run: flutter test

  # ========== 2. Android 构建 ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Android to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 3. Windows 构建 ==========
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows bundle
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath rule_dev_tool-windows-v${{ github.ref_name }}.zip

      - name: Upload Windows to Release
        uses: softprops/action-gh-release@v1
        with:
          files: rule_dev_tool-windows-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 4. Linux 构建 ==========
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Zip Linux bundle
        run: zip -r rule_dev_tool-linux-v${{ github.ref_name }}.zip build/linux/x64/release/bundle/

      - name: Upload Linux to Release
        uses: softprops/action-gh-release@v1
        with:
          files: rule_dev_tool-linux-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 5. macOS 构建 ==========
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Zip macOS app
        run: zip -r rule_dev_tool-macos-v${{ github.ref_name }}.zip build/macos/Build/Products/Release/rule_dev_tool.app/

      - name: Upload macOS to Release
        uses: softprops/action-gh-release@v1
        with:
          files: rule_dev_tool-macos-v${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ========== 6. iOS 构建 ==========
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (IPA)
        run: flutter build ipa --release --no-codesign

      - name: Upload iOS to Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/ios/ipa/*.ipa
     
