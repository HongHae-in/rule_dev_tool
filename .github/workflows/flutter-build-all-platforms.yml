name: Flutter Build Multi-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          # Android 增加 split-per-abi 参数
          - { name: Android, os: ubuntu-latest, command: flutter build apk --release --split-per-abi }
          - { name: Windows, os: windows-latest, command: flutter build windows --release }
          - { name: macOS,   os: macos-latest,   command: flutter config --enable-macos-desktop && flutter build macos --release }
          - { name: Linux,   os: ubuntu-latest,  command: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libblkid-dev liblzma-dev && flutter build linux --release }
          - { name: Web,     os: ubuntu-latest,  command: flutter build web --release }
          - { name: iOS,     os: macos-latest,   command: flutter build ios --release --no-codesign }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: 'any'

      - name: Install dependencies
        run: flutter pub get

      - name: Execute Build
        run: ${{ matrix.platform.command }}

      # ========== 产物处理：重命名并整理到 output 文件夹 ==========
      - name: Prepare Artifacts
        shell: bash
        run: |
          mkdir -p output
          case "${{ matrix.platform.name }}" in
            Android)
              # 提取三种架构的 APK 并重命名
              cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk output/rule_dev_tool_arm64.apk
              cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk output/rule_dev_tool_armv7.apk
              cp build/app/outputs/flutter-apk/app-x86_64-release.apk output/rule_dev_tool_x86_64.apk
              ;;
            Windows)
              # 复制 exe 到 output
              cp build/windows/x64/runner/Release/rule_dev_tool.exe output/rule_dev_tool.exe
              # 将 exe 连同其依赖的 dll 一起打包（这是用户真正能用的包）
              cd build/windows/x64/runner/Release
              zip -r ../../../../../output/rule_dev_tool_windows_portable.zip *
              ;;
            macOS)
              cd build/macos/Build/Products/Release
              zip -r ../../../../../output/rule_dev_tool_macos.zip rule_dev_tool.app
              ;;
            Linux)
              cd build/linux/x64/release/bundle
              zip -r ../../../../../output/rule_dev_tool_linux.zip *
              ;;
            Web)
              cd build/web
              zip -r ../../output/rule_dev_tool_web.zip *
              ;;
            iOS)
              # 只有 .app 文件夹，供越狱或特殊用途
              cd build/ios/iphoneos
              zip -r ../../../output/rule_dev_tool_ios.zip Runner.app
              ;;
          esac

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
