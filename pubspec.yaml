name: rule_dev_tool
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # 核心修复：显式升级 jni 包，解决 JniResult/JObject 等类型缺失问题
  jni: ^0.10.0

  # 修复 xpath_selector_html_parser 版本冲突
  xpath_selector_html_parser: ^3.0.1

  # 使用稳定版本的 path_provider_android
  path_provider_android: ^2.2.4
  path_provider: ^2.1.4

  # 依赖注入和路由管理
  flutter_modular: ^6.3.2

  # 状态管理
  mobx: ^2.3.3+2
  flutter_mobx: ^2.2.1+1

  # 网络请求
  dio: ^5.4.3+1

  # 本地数据存储
  shared_preferences: ^2.2.3

  # UI组件
  card_settings_ui: ^2.0.1

  cupertino_icons: ^1.0.8

  # HTML解析
  html: ^0.15.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
